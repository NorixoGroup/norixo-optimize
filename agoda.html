    const src = err.path[0].src;
    const href = err.path[0].href;
    var message = ["could not load", src ? src : href].join(" ");
    try {
        const log = messagingClient.create('log', { logLevel: 'error', message: message, applicationName: 'cronos', loggerName: 'Fe.Cronos.Logger' });
        messagingClient.send(log);
    }
    catch (exception) {
    }
}

rhood:"Environs",recommendationHeaderGuestRating:"Note des clients",recommendationHeaderPricePerNight:"Tarifs par nuit à partir de",cityCountrySeparator:"{0}, {1}",recommendedMoreDetails:"Voir cet établissement",compareYourRecentlyViewed:"Comparer les établissements récemment consultés",justMissedIt:"Nous n'avons plus de disponibilités pour vos dates",soldOnYourDates:"Épuisé à vos dates !",dining:"Repas",recommendationHeaderBreakFastAvailable:"Petit-déjeuner disponible",managedByAPrivateHostBadge:"Géré par un hôte privé",managedByAPrivateHost:"Géré par un hôte privé",hygienePlus:"Hygiène Plus",hygienePlusDescriptionText:"L'établissement à mis en place et certifié ses propres mesures d'hygiène.",safetyFeatures:"Équipements de sécurité",preventativeEquipment:"Matériel de prévention",healthAndMedical:"Santé et matériel médical",hygienePlusLearnMore:"En savoir plus",hygienePlusFullDescriptionMarkdown:"<div class=\"bcard-terms-txt\">\n <p>Agoda lance Hygiene Plus, pour aider les voyageurs &agrave; prendre des d&eacute;cisions de voyage avis&eacute;es. Nos partenaires associ&eacute;s &agrave; cette campagne s'engagent &agrave; fournir un environnement sain &agrave; leurs clients et leur personnel en renfor&ccedil;ant les mesures de s&eacute;curit&eacute; et d'hygi&egrave;ne. Ces partenaires ont confirm&eacute; qu'ils respecteraient une liste de mesures sp&eacute;cifiques concernant la s&eacute;curit&eacute; et l'hygi&egrave;ne, ces derniers peuvent mettre &agrave; jour leur liste &agrave; tout moment - vous fournissant ainsi des informations actualis&eacute;es pour vous aider &agrave; faire le choix le plus &eacute;clair&eacute;.&nbsp;<\/p>\n<p>Hygiene Plus ne repr&eacute;sente pas une garantie de la part d'Agoda comme quoi un logement serait sans risque. Nous comptons sur les &eacute;tablissement pour que ceux-ci assurent leurs propres mesures de s&eacute;curit&eacute; et de confort. En tant que voyageur, il vous incombe de suivre les conseils &eacute;mis par les organismes officiels, d'appliquer les mesures d'hygi&egrave;ne personnelle conseill&eacute;es et de respecter les distances physiques pendant votre s&eacute;jour. Agoda encourage ses voyageurs &agrave; toujours voyager en toute s&eacute;curit&eacute; et &agrave; rester vigilant et inform&eacute; face &agrave; l'&eacute;volution des conditions.<\/p>\n<p>Les mesures de s&eacute;curit&eacute; et d'hygi&egrave;ne actuellement incluses dans Hygiene Plus sont&nbsp;:<\/p>\n<p><strong>Consignes de s&eacute;curit&eacute;<\/strong><\/p>\n<ul>\n<li>D&eacute;sinfection suppl&eacute;mentaire dans les espaces communs ainsi que dans toutes les chambres, en portant une attention suppl&eacute;mentaire aux endroits fr&eacute;quemment touch&eacute;s tels que les boutons d'ascenseur, les rampes, les interrupteurs, etc.<\/li>\n<li>Mise en place d'une formation pour s'assurer que le personnel de l'&eacute;tablissement est au courant des protocoles de s&eacute;curit&eacute; et d'hygi&egrave;ne.<\/li>\n<li>Contr&ocirc;le quotidien de la temp&eacute;rature pour le personnel et les h&ocirc;tes &agrave; l'entr&eacute;e du b&acirc;timent ou des installations.<\/li>\n<li>Proposer un enregistrement en ligne, automatique ou en libre-service pour r&eacute;duire les contacts humains et &eacute;viter les infections crois&eacute;es.<\/li>\n<li>Installation d'un &eacute;cran de protection transparent dans les espaces communs entre les personnes lors des transactions en face &agrave; face.<\/li>\n<\/ul>\n<p><strong>&Eacute;quipements de protection <\/strong><\/p>\n<ul>\n<li>Des d&eacute;sinfectants pour les mains disponibles dans tous les espaces communs de l'&eacute;tablissement.<\/li>\n<li>Protections faciales/masques ou autres &eacute;quipements de protection port&eacute;s par le personnel de l'&eacute;tablissement<\/li>\n<li>St&eacute;rilisation des &eacute;quipements pour &eacute;liminer, tuer ou rendre inoffensifs les virus, bact&eacute;ries, etc.&nbsp;<\/li>\n<\/ul>\n<p><strong>La distanciation physique <\/strong><\/p>\n<ul>\n<li>Distance physique d'au moins 1 m&egrave;tre entre les personnes dans les espaces communs.<\/li>\n<li>R&eacute;am&eacute;nagement des tables et des si&egrave;ges dans les salles &agrave; manger pour assurer la distanciation physique pr&eacute;conis&eacute;e.<\/li>\n<\/ul>\n<p><strong>Sant&eacute; et soins m&eacute;dicaux<\/strong><\/p>\n<ul>\n<li>Du mat&eacute;riel de sant&eacute; et des &eacute;quipements utilis&eacute;s pour les traitements m&eacute;dicaux sont disponibles sur place.<\/li>\n<\/ul>\n<p><strong>Conditions et clause de non-responsabilit&eacute;<\/strong><\/p>\n<ul>\n<li>Lorsque vous effectuez une r&eacute;servation dans un h&ocirc;tel ou un logement (&laquo;&nbsp;&eacute;tablissement&nbsp;&raquo;) respectant les mesures Hygi&egrave;ne Plus ou l'identifiant d'affichage (&laquo;&nbsp;Hygi&egrave;ne Plus&nbsp;&raquo;), nous souhaitons &eacute;tablir clairement que l'&eacute;tablissement seul a auto-certifi&eacute; la mise en place et le respect des mesures sur place. &Agrave; ce titre, les &eacute;tablissements sont seuls &agrave; confirmer qu'ils disposent des &eacute;quipements (et/ou des certifications applicables) et qu'ils appliquent les mesures Hygi&egrave;ne Plus &eacute;num&eacute;r&eacute;es en mati&egrave;re de propret&eacute;, de s&eacute;curit&eacute; et d'hygi&egrave;ne au moment de votre r&eacute;servation.<\/li>\n<\/ul>\n<ul>\n<li>Les &eacute;tablissements peuvent ponctuellement mettre &agrave; jour les mesures Hygi&egrave;ne Plus identifi&eacute;es comme &eacute;tant disponibles * et peuvent choisir de se retirer du programme Hygi&egrave;ne Plus si ils ne respectent plus totalement ou seulement partiellement leurs engagements par rapport aux &eacute;quipements et/ou mesures. Vous devez, avant de vous enregistrer, rev&eacute;rifier le statut des mesures mises &agrave; disposition par l'&eacute;tablissement car celles-ci sont susceptibles d'&ecirc;tre modifi&eacute;es.<\/li>\n<\/ul>\n<ul>\n<li>Si vous rencontrez des probl&egrave;mes apr&egrave;s votre enregistrement, veuillez vous adresser directement &agrave; l'&eacute;tablissement.<\/li>\n<\/ul>\n<ul>\n<li>Veuillez noter que l'enregistrement &agrave; l'&eacute;tablissement peut vous &ecirc;tre refus&eacute; en raison d'une temp&eacute;rature corporelle trop &eacute;lev&eacute;e ou si vous souffrez d'une maladie contagieuse.<\/li>\n<\/ul>\n<ul>\n<li>Agoda tient &agrave; pr&eacute;ciser que les services d'h&eacute;bergement, y compris les mesures d'Hygi&egrave;ne Plus, fournis par l'&eacute;tablissement par l'interm&eacute;diaire de la plate-forme Agoda sont sous la seule responsabilit&eacute; de l'&eacute;tablissement.<\/li>\n<\/ul>\n<ul>\n<li>Sauf indication contraire, toutes les autres dispositions des conditions d'utilisation et de la politique de confidentialit&eacute; d'Agoda restent applicables.<\/li>\n<\/ul>\n<\/div>",wellness:"Bien-être",wellnessTabDescription:"Tout ce dont vous avez besoin pour un séjour reposant.",seeAllAmenities:"Voir tous les équipements",staycationWellness:"Bien-être",drinkingAndDining:"Restauration & collations",activities:"Activités",sportsAndEntertainment:"Sports & Divertissement",staycationOffersAvailable:"Offres de séjours locaux disponibles",staycationDescription:"Bénéficiez d'avantages spéciaux pour votre séjour",travelAdvisorPropertyBannerTravellingCountry:"Destination {0} !",travelAdvisorPropertyBannerText:"{0} Veuillez lire les exigences de voyage actuelles avant de réserver.",travelAdvisorPropertyBannerLink:"En savoir plus",travelAdvisorPropertyBannerDomesticText:"Voyager de l'étranger vers {0} ? ",travelAdvisorPropertyBannerRestrictionsModalEntryRequirementTitle:"Conditions d'entrée - {0}",travelAdvisorPropertyBannerRestrictionsModalCovid19StatusToggleLabel:"Vacciné(e) contre la COVID-19",travelAdvisorPropertyBannerRestrictionsModalQuarantine:"Quarantaine",travelAdvisorPropertyBannerRestrictionsModalPreDepartureCovidTest:"Test Covid avant le départ",travelAdvisorPropertyBannerRest 'hygiène ont également la possibilité d'afficher un badge Hygiène Plus.\n\t<\/p>\n\t<p>\n\t\t<u>Ni le badge Hygiene Plus ni les informations relatives aux équipements affichées sur Agoda ne constituent une garantie de la part d'Agoda qu'un logement est sans risque ou que le risque a été contrôlé pour ne pas dépasser un certain niveau.<\/u> À son initiative, chaque établissement déclare simplement à ses hôtes potentiels que l'établissement a mis en place un certain nombre d'aménagements, tels que figurant sur la page de l'établissement sur Agoda. Agoda ne vérifie <u>pas<\/u> ni ne certifie ces autodéclarations. \n\t<\/p>\n\t<p>\n\t\tEn tant que voyageur, il est de votre responsabilité de suivre les conseils officiels, de respecter les mesures d'hygiène personnelle et d'appliquer une distanciation physique pendant votre séjour. Agoda vous encourage à voyager en toute sécurité et de manière responsable et à rester vigilant face à l'évolution des conditions.\n\t<\/p>\n\t<h4>\n\t\tConditions d'utilisation\n\t<\/h4>\n\t<ul>\n\t\t<li>\n\t\t\t\tToutes les informations affichées sur Agoda concernant les équipements, mesures et/ou efforts liés à l'établissement (ensemble, <b>« aménagements »<\/b>) - y compris, sans limitation, les aménagements relatifs à la propreté et à l'hygiène - sont des informations obtenues par le biais d'une <u>autodéclaration<\/u> de l'établissement. Vous reconnaissez qu'Agoda ne vérifie <u>pas<\/u> ni ne certifie une telle autodéclaration et que seul l'établissement vous indique qu'au moment de la réservation, il a mis en place les aménagements indiqués.\n\t\t<\/li>\n\t\t<li>\n\t\t\t\tVous reconnaissez que ni le badge Hygiene Plus ni les informations relatives aux aménagements tels qu'indiqués sur Agoda ne constituent une garantie de la part d'Agoda qu'un hébergement ne représente pas de risques ou que le risque a été contrôlé jusqu'à un certain niveau.\n\t\t<\/li>\n\t\t<li>\n\t\t\t\tUn établissement peut, de temps à autre, modifier son autodéclaration concernant les équipements dont il dispose et peut choisir de retirer le badge Hygiène Plus. Vous devez, avant l'enregistrement, contacter directement l'établissement pour confirmer l'état des aménagements de l'établissement, car la disponibilité ou la mise en place des équipements est susceptible de changer à tout moment.\n\t\t<\/li>\n\t\t<li>\n\t\t\t\tSi vous rencontrez des problèmes après votre enregistrement, veuillez en faire part directement à l'établissement.\n\t\t<\/li>\n\t\t<li>\n\t\t\t\tVous reconnaissez que si vous présentez des signes de température corporelle élevée ou souffrez d'une maladie contagieuse, un établissement se réserve le droit de ne pas pour autoriser à vous vous enregistrer.\n\t\t<\/li>\n\t\t<li>\n\t\t\t\tVOUS RECONNAISSEZ ET ACCEPTEZ QUE L'ÉTABLISSEMENT, SON PROPRIÉTAIRE ET SA DIRECTION SONT SEULS RESPONSABLES EN CE QUI CONCERNE LE BADGE « HYGIENE PLUS », LES SERVICES FOURNIS PAR ET DANS L'ÉTABLISSEMENT, LA DISPONIBILITÉ OU NON DES ÉQUIPEMENTS DANS L'ÉTABLISSEMENT, OU TOUTE DÉCLARATION OU REPRÉSENTATION S'Y RAPPORTANT. AGODA DÉCLINE TOUTE RESPONSABILITÉ ENVERS LES HÔTES EN CE QUI CONCERNE LE BADGE « HYGIENE PLUS », LES SERVICES FOURNIS DANS L'ÉTABLISSEMENT, LA DISPONIBILITÉ OU NON DES ÉQUIPEMENTS DANS L'ÉTABLISSEMENT, OU TOUTE DÉCLARATION OU REPRÉSENTATION S'Y RAPPORTANT.\n\t\t<\/li>\n\t\t<li>\n\t\t\t\tSauf indication contraire ou notification de la part d'Agoda, les conditions d'utilisation et la politique de confidentialité d'Agoda restent applicables à votre égard. En cas d'ambiguïté dans les termes, l'interprétation raisonnable d'Agoda prévaudra. Agoda peut modifier ces conditions à tout moment et en utilisant la plate-forme de réservation d'Agoda, vous acceptez que de telles modifications puissent se produire.\n\t\t<\/li>\n\t\t<li>\n\t\t\t\tVous devez soumettre tout litige en rapport avec les présentes conditions, les aménagements ou le badge Hygiene Plus à la juridiction exclusive des tribunaux compétents de Singapour, si ce litige ne peut être résolu à l'amiable.\n\t\t<\/li>\n\t\t<li>\n\t\t\t\tSi une partie des présentes conditions est jugée invalide ou inapplicable, le reste des présentes conditions ne sera pas affecté par cette constatation, et la partie invalide ou inapplicable sera remplacée par une nouvelle disposition valide et applicable ayant un effet similaire dans toute la mesure du possible.\n\t\t<\/li>\n\t<\/ul>\n<\/div>",priceBeforeApplyingCoupon:"Prix avant application du bon",priceAfterApplyingCoupon:"Prix après application du bon",matchScoreExcellentBreakfast:"Excellent petit-déjeuner",matchScoreGreatBreakfast:"Très bon petit-déjeuner",matchScoreGoodBreakfast:"Bon petit-déjeuner",matchScoreExcellentLocation:"Excellent emplacement",matchScoreGreatLocation:"Très bon emplacement",matchScoreGoodLocation:"Bon emplacement",matchScoreExcellentStaff:"Excellent personnel",matchScoreGreatStaff:"Très bon personnel",matchScoreGoodStaff:"Bon personnel",matchScoreVerySpacious:"Très spacieux",matchScoreVeryClean:"Très propre",matchScoreTooltipMain:"{0}, nous pensons que c'est le choix {1}",matchScoreGreatForYou:"parfait pour vous",matchScoreTooltipDescription:"En fonction des établissements récemment consultés et de vos réservations précédentes.",matchScoreIsThisHelpful:"Cela vous a-t-il aidé ?",matchScoreTooltipMainWithoutName:"Nous pensons que c'est le choix {0}",agodaSpecialOffers:"Agoda Special Offers",asoMoreInfo:"Plus d'infos",seeRoomDeals:"Voir les offres de chambres",reviewScoreDisappoint:"Note des avis",reviewScoreAboveAverage:"Note des avis",reviewScorePleasant:"Bien",reviewScoreGood:"Très bien",reviewScoreVeryGood:"Très bien",reviewScoreExcellent:"Fantastique",reviewScoreSuperb:"Superbe",reviewGroupNameAllGuests:"Tous les voyageurs",agodaReviewsHeader:"Fournis par les hôtes vérifiés de",bookingComVerifiedReviewsLogoText:"Avis vérifiés fournis par",reviewScoreDistributionExceptional:"+9 Exceptionnel",reviewScoreDistributionExcellent:"8-9 Excellent",reviewScoreDistributionVeryGo
